<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src *; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0071e3">
  <meta name="description" content="开发者代码片段、笔记与 API 测试工具">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>SnippetVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
  <div id="file-protocol-warning" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#f5f5f7;color:#1d1d1f;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;z-index:99999;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:40px;">
    <div style="font-size:48px;margin-bottom:20px;">⚠️</div>
    <h2 style="font-size:20px;margin-bottom:12px;font-weight:600;">无法直接通过文件协议打开</h2>
    <p style="font-size:14px;color:#6b7280;max-width:400px;line-height:1.6;margin-bottom:24px;">
      现代浏览器出于安全考虑，禁止通过 <code>file://</code> 协议加载 ES 模块。<br>
      请使用以下方式预览：
    </p>
    <div style="background:#fff;border-radius:12px;padding:20px 24px;box-shadow:0 4px 20px rgba(0,0,0,0.08);max-width:420px;text-align:left;font-size:13px;line-height:1.8;">
      <strong>Windows：</strong>双击 <code>start-web-server.bat</code><br>
      <strong>Linux / macOS：</strong>运行 <code>./start-web-server.sh</code><br>
      <strong>或手动：</strong><code>python3 -m http.server 8080</code>，然后访问 <code>http://localhost:8080</code>
    </div>
  </div>
  <script>
    (function(){
      if(window.location.protocol==='file:'&&!navigator.userAgent.includes('Electron')){
        var w=document.getElementById('file-protocol-warning');
        if(w)w.style.display='flex';
      }
    })();
  </script>
</body>
</html>
